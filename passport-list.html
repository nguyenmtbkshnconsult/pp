<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Danh sách hộ chiếu</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: linear-gradient(135deg, #1a3a5c 0%, #2d5a87 25%, #c47a3a 65%, #e8a050 100%);
    background-attachment: fixed;
    color: #1a1a1a;
    padding: 2rem 1rem 4rem;
    font-size: 14px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 700px; margin: 0 auto; }

  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; color: #fff; }
  .sub { font-size: 13px; color: rgba(255,255,255,0.65); margin-bottom: 1.25rem; }

  .search {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    background: rgba(255,255,255,0.95);
    font-size: 14px;
    font-family: inherit;
    color: #1a1a1a;
    outline: none;
    margin-bottom: 1rem;
    transition: border-color 0.15s, box-shadow 0.15s;
    backdrop-filter: blur(4px);
  }
  .search:focus { border-color: rgba(255,255,255,0.5); box-shadow: 0 0 0 3px rgba(255,255,255,0.15); }
  .search::placeholder { color: #b0b0a8; }

  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .filter-btn {
    padding: 6px 12px;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 6px;
    background: rgba(255,255,255,0.15);
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    color: rgba(255,255,255,0.85);
    cursor: pointer;
    transition: all 0.12s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    backdrop-filter: blur(4px);
  }
  .filter-btn:hover { background: rgba(255,255,255,0.25); color: #fff; }
  .filter-btn.active { color: #fff; border-color: transparent; }
  .filter-btn[data-f="hn"] .dot { width: 7px; height: 7px; border-radius: 50%; background: #d99a2a; }
  .filter-btn[data-f="vat-hn"] .dot { width: 7px; height: 7px; border-radius: 50%; background: #c53030; }
  .filter-btn[data-f="vat-sg"] .dot { width: 7px; height: 7px; border-radius: 50%; background: #2563eb; }
  .filter-btn[data-f="sg"] .dot { width: 7px; height: 7px; border-radius: 50%; background: #1a7a9b; }
  .filter-btn[data-f="hn"].active { background: #d99a2a; }
  .filter-btn[data-f="vat-hn"].active { background: #c53030; }
  .filter-btn[data-f="vat-sg"].active { background: #2563eb; }
  .filter-btn[data-f="sg"].active { background: #1a7a9b; }
  .filter-btn.active .dot { background: rgba(255,255,255,0.5); }

  /* Group headers */
  .group { margin-bottom: 2rem; }
  .group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding: 0 2px;
  }
  .group-tag {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 5px;
  }
  .tag-hn { background: #d99a2a; color: #fff; }
  .tag-sg { background: #1a7a9b; color: #fff; }
  .tag-vat-sg { background: #2563eb; color: #fff; }
  .tag-vat-hn { background: #c53030; color: #fff; }

  .group-label {
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
  }
  .group-count {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-left: auto;
  }

  .group-desc {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin: -6px 0 10px 2px;
  }

  /* Cards */
  .card {
    background: #fff;
    border: none;
    border-radius: 12px;
    padding: 0;
    margin-bottom: 12px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }
  .card.border-blue { border-left: 3px solid #2563eb; }
  .card.border-red { border-left: 3px solid #c53030; }

  .card-top {
    text-align: center;
    padding: 20px 16px 16px;
    background: #fafaf8;
    border-bottom: 1px solid #efefeb;
  }

  .card-name {
    font-size: 18px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 3px;
  }

  .card-sex {
    font-size: 12px;
    color: #999;
  }

  .fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 24px;
    padding: 4px 20px 12px;
  }

  .f {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid #f2f2ee;
    gap: 8px;
    min-width: 0;
  }
  .f-left { min-width: 0; flex: 1; }
  .f-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #999;
    margin-bottom: 1px;
  }
  .f-val {
    font-size: 13px;
    color: #1a1a1a;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .f-val.mono {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.02em;
  }

  .cp {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border: 1px solid #e8e8e4;
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #bbb;
    transition: all 0.12s;
  }
  .cp:hover { border-color: #ccc; color: #555; background: #fafaf8; }
  .cp.ok { border-color: #b4deb0; color: #4a9e44; background: #f2fbf1; }

  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: rgba(255,255,255,0.6);
    font-size: 14px;
  }

  @media (max-width: 520px) {
    body { padding: 1.25rem 0.75rem 3rem; }
    .fields { grid-template-columns: 1fr; padding: 4px 14px 10px; }
    .card-top { padding: 16px 14px 12px; }
    .card-name { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="wrap">
  <h1>Danh sách hộ chiếu</h1>
  <p class="sub" id="count">21 người</p>
  <input class="search" id="q" type="text" placeholder="Tìm kiếm..." autocomplete="off" />
  <div class="filters">
    <button class="filter-btn" data-f="hn" onclick="toggle('hn')"><span class="dot"></span>Hà Nội</button>
    <button class="filter-btn" data-f="vat-hn" onclick="toggle('vat-hn')"><span class="dot"></span>Hà Nội · VAT</button>
    <button class="filter-btn" data-f="vat-sg" onclick="toggle('vat-sg')"><span class="dot"></span>Sài Gòn · VAT</button>
    <button class="filter-btn" data-f="sg" onclick="toggle('sg')"><span class="dot"></span>Sài Gòn</button>
  </div>
  <div id="list"></div>
</div>

<script>
const groups = [
  {
    id: 'hn',
    tag: 'HN',
    tagClass: 'tag-hn',
    label: 'Xuất phát từ Hà Nội',
    desc: null,
    people: [
      {vn:"Mai Trung Nguyên",sex:"Nam",ho:"MAI",ten:"TRUNG NGUYEN",dob:"06/09/2001",qg:"VIET NAM",so:"P00353342",cap:"05/08/2022",han:"05/08/2032"},
      {vn:"Phạm Nghĩa Hiệp",sex:"Nam",ho:"PHAM",ten:"NGHIA HIEP",dob:"17/07/2010",qg:"VIET NAM",so:"E03541662",cap:"18/03/2025",han:"18/03/2035"},
      {vn:"Nguyễn Khánh Chi",sex:"Nữ",ho:"NGUYEN",ten:"KHANH CHI",dob:"08/02/2009",qg:"VIET NAM",so:"E04623557",cap:"04/06/2026",han:"04/06/2036"},
      {vn:"Phạm Bách",sex:"Nam",ho:"PHAM",ten:"BACH",dob:"27/11/2008",qg:"VIET NAM",so:"E03582456",cap:"17/03/2025",han:"17/03/2035"},
      {vn:"Trần Hà Trang",sex:"Nữ",ho:"TRAN",ten:"HA TRANG",dob:"21/09/2010",qg:"VIET NAM",so:"E03537613",cap:"16/07/2025",han:"16/07/2035"},
      {vn:"Nguyễn Phi Long",sex:"Nam",ho:"NGUYEN",ten:"PHI LONG",dob:"01/06/2010",qg:"VIET NAM",so:"E04604606",cap:"02/06/2026",han:"02/06/2036"},
      {vn:"Nguyễn Linh Chi",sex:"Nữ",ho:"NGUYEN",ten:"LINH CHI",dob:"02/09/2001",qg:"VIET NAM",so:"P02377372",cap:"10/07/2023",han:"10/07/2033"},
      {vn:"Đỗ Nhật Anh",sex:"Nam",ho:"DO",ten:"NHAT ANH",dob:"15/03/2010",qg:"VIET NAM",so:"P02223131",cap:"06/06/2023",han:"06/06/2028"},
      {vn:"Phạm Hữu Việt Anh",sex:"Nam",ho:"PHAM",ten:"HUU VIET ANH",dob:"05/08/2009",qg:"VIET NAM",so:"P02117102",cap:"01/06/2023",han:"01/06/2028"},
      {vn:"Phạm Hữu Hoàng Anh",sex:"Nam",ho:"PHAM",ten:"HUU HOANG ANH",dob:"19/11/2010",qg:"VIET NAM",so:"P02117101",cap:"01/06/2023",han:"01/06/2028"},
      {vn:"Trần Thế Hải",sex:"Nam",ho:"TRAN",ten:"THE HAI",dob:"29/04/2008",qg:"VIET NAM",so:"P00080555",cap:"28/07/2022",han:"28/07/2032"},
    ]
  },
  {
    id: 'vat-hn',
    tag: 'VAT · HN',
    tagClass: 'tag-vat-hn',
    label: 'Lấy VAT công ty — mã Hà Nội',
    desc: null,
    cardClass: 'border-red',
    people: [
      {vn:"Lê Anh Thư",sex:"Nữ",ho:"LE",ten:"ANH THU",dob:"10/10/2009",qg:"VIET NAM",so:"P02134219",cap:"27/05/2023",han:"27/05/2028"},
      {vn:"Huỳnh Khánh Ngọc",sex:"Nữ",ho:"HUYNH",ten:"KHANH NGOC",dob:"08/07/2009",qg:"VIET NAM",so:"E04569852",cap:"29/05/2026",han:"29/05/2036"},
      {vn:"Lâm Bảo Quỳnh",sex:"Nữ",ho:"LAM",ten:"BAO QUYNH",dob:"21/11/1994",qg:"VIET NAM",so:"E01943058",cap:"28/05/2024",han:"28/05/2034"},
      {vn:"Phạm Văn Khương",sex:"Nam",ho:"PHAM",ten:"VAN KHUONG",dob:"13/01/1992",qg:"VIET NAM",so:"E03525546",cap:"06/06/2025",han:"06/06/2035"},
    ]
  },
  {
    id: 'vat-sg',
    tag: 'VAT · SG',
    tagClass: 'tag-vat-sg',
    label: 'Lấy VAT công ty — mã Sài Gòn',
    desc: null,
    cardClass: 'border-blue',
    people: [
      {vn:"Nguyễn Hạnh Nguyên",sex:"Nữ",ho:"NGUYEN",ten:"HANH NGUYEN",dob:"15/05/2009",qg:"VIET NAM",so:"E04554238",cap:"21/05/2026",han:"21/05/2036"},
      {vn:"Nguyễn Phú Xuân Nghi",sex:"Nữ",ho:"NGUYEN",ten:"PHU XUAN NGHI",dob:"20/04/2009",qg:"VIET NAM",so:"P00916694",cap:"24/11/2022",han:"24/11/2027"},
      {vn:"Lê Nhật Minh",sex:"Nam",ho:"LE",ten:"NHAT MINH",dob:"23/08/1999",qg:"VIET NAM",so:"P04089799",cap:"05/02/2026",han:"05/02/2036"},
    ]
  },
  {
    id: 'sg',
    tag: 'SG',
    tagClass: 'tag-sg',
    label: 'Xuất phát từ Sài Gòn',
    desc: null,
    people: [
      {vn:"Nguyễn Thục Anh",sex:"Nữ",ho:"NGUYEN",ten:"THUC ANH",dob:"03/10/2009",qg:"VIET NAM",so:"P02335667",cap:"13/07/2023",han:"13/07/2028"},
      {vn:"Phạm Khánh Linh",sex:"Nữ",ho:"PHAM",ten:"KHANH LINH",dob:"10/07/2010",qg:"VIET NAM",so:"E03717688",cap:"17/06/2025",han:"17/06/2035"},
      {vn:"Đoàn Minh Khôi",sex:"Nam",ho:"DOAN",ten:"MINH KHOI",dob:"30/08/2009",qg:"VIET NAM",so:"P02053392",cap:"04/05/2023",han:"04/05/2028"},
    ]
  },
];

const ci=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
const ok=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

function cp(v,btn){
  navigator.clipboard.writeText(v).then(()=>{
    btn.innerHTML=ok;btn.classList.add('ok');
    setTimeout(()=>{btn.innerHTML=ci;btn.classList.remove('ok')},1200);
  });
}

function f(label,val,mono){
  const safe=val.replace(/'/g,"\\'");
  return `<div class="f">
    <div class="f-left">
      <div class="f-label">${label}</div>
      <div class="f-val${mono?' mono':''}">${val}</div>
    </div>
    <button class="cp" onclick="cp('${safe}',this)" title="Copy">${ci}</button>
  </div>`;
}

function card(p, cls) {
  return `<div class="card${cls?' '+cls:''}">
    <div class="card-top">
      <div class="card-name">${p.vn}</div>
      <div class="card-sex">${p.sex}</div>
    </div>
    <div class="fields">
      ${f('Họ',p.ho,false)}
      ${f('Tên đệm & tên',p.ten,false)}
      ${f('Giới tính',p.sex,false)}
      ${f('Ngày sinh',p.dob,true)}
      ${f('Quốc tịch',p.qg,false)}
      ${f('Số hộ chiếu',p.so,true)}
      ${f('Ngày cấp',p.cap,true)}
      ${f('Ngày hết hạn',p.han,true)}
    </div>
  </div>`;
}

let activeFilter = null;

function toggle(f) {
  activeFilter = activeFilter === f ? null : f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.f === activeFilter));
  render();
}

function render(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  let totalShown=0;
  let html='';

  groups.forEach(g=>{
    if (activeFilter && g.id !== activeFilter) return;
    const filtered=q
      ? g.people.filter(p=>(p.vn+p.ho+p.ten+p.so+p.dob+p.cap+p.han).toLowerCase().includes(q))
      : g.people;
    if(!filtered.length) return;
    totalShown+=filtered.length;
    html+=`<div class="group">
      <div class="group-header">
        <span class="group-tag ${g.tagClass}">${g.tag}</span>
        <span class="group-label">${g.label}</span>
        <span class="group-count">${filtered.length} người</span>
      </div>
      ${g.desc?`<div class="group-desc">${g.desc}</div>`:''}
      ${filtered.map(p=>card(p, g.cardClass||'')).join('')}
    </div>`;
  });

  document.getElementById('count').textContent=totalShown+' người';
  document.getElementById('list').innerHTML=html||'<div class="empty">Không tìm thấy</div>';
}

document.getElementById('q').addEventListener('input',render);
render();
</script>
</body>
</html>
